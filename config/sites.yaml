# Site network profiles for trendpress.
#
# Top level is a LIST of site entries. The application password lives in the env
# var named by `app_password_env` (see .env), never here. `niche` drives
# topic->site matching, so each city site states its locale + general UK remit.
#
# status: active | canary | paused   (paused sites are skipped by the daily run)

- id: site1
  name: "London Headline"
  url: "https://londonheadline.uk"
  wp_username: "News Desk"
  app_password_env: "WP_PASS_SITE1"
  niche: >
    Fast, accessible London and UK news for a general British audience. Covers
    breaking national news, football and other sport, entertainment and
    celebrity stories, and major human-interest and politics-as-news topics.
  audience: "London and UK news readers wanting quick, clear coverage of the day's big stories"
  tone: "clear, factual, neutral newsroom style"
  angle_pool:
    - "news report"
    - "what we know so far"
    - "London angle"
    - "background and context"
    - "reaction roundup"
  word_range: [600, 900]
  posts_per_day_cap: 2
  status: active

